<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👑</text></svg>">
  <title>Bingo Royale Premium - Senior Enterprise Edition</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Bungee+Shade&display=swap');

    :root {
      --gold: #D4AF37;
      --gold-light: #F9E076;
      --gold-dark: #996515;
      --royal-blue: #1e3a8a;
      --deep-bg: #05070a;
      --card-bg: #0f172a;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--deep-bg);
      color: #f1f5f9;
      overflow-x: hidden;
    }

    /* Bingo Royale Theme Classes */
    .bingo-title {
      font-family: 'Bungee Shade', cursive;
      background: linear-gradient(to bottom, var(--gold-light), var(--gold), var(--gold-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
    }

    .glass-card {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(212, 175, 55, 0.2);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .gold-gradient-bg {
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
    }

    .bingo-cell {
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.5rem;
      border-radius: 0.75rem;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .bingo-cell-empty {
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.2);
    }

    .bingo-cell-marked {
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      color: var(--deep-bg);
      transform: scale(0.95);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.5);
    }

    .bingo-cell-free {
      background: linear-gradient(135deg, #6366f1, #4338ca);
      color: white;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
    }

    /* Custom Animations */
    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
      50% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.7); }
    }

    .active-number-glow {
      animation: pulse-gold 2s infinite;
    }

    .fade-up {
      animation: fadeUp 0.6s ease-out forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Senior Responsive Grid */
    .bingo-grid-container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.75rem;
      padding: 1.5rem;
      background: var(--card-bg);
      border-radius: 2rem;
      border: 4px solid var(--gold);
      position: relative;
    }

    .bingo-grid-container::before {
      content: 'ROYALE';
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--gold);
      color: var(--deep-bg);
      padding: 2px 16px;
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      border-radius: 100px;
    }

    /* Utility */
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="selection:bg-amber-500 selection:text-white">

  <div id="root"></div>

  <script type="module">
    import React, { useState, useEffect, useMemo, useCallback } from 'https://esm.sh/react@18';
    import ReactDOM from 'https://esm.sh/react-dom@18/client';
    import htm from 'https://esm.sh/htm';
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, writeBatch, getDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const html = htm.bind(React.createElement);

    // --- CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyCFdkfrUi1FM-jktyB4IOdWt4PYe5v-gXU",
      authDomain: "bingo-b7670.firebaseapp.com",
      projectId: "bingo-b7670",
      storageBucket: "bingo-b7670.firebasestorage.app",
      messagingSenderId: "529198823545",
      appId: "1:529198823545:web:58cf2abcf93a26ce933ca8"
    };

    const APP_NAMESPACE = 'bingo_royale_enterprise_final';
    const ROLES = { ADMIN: 'super_admin', STAFF: 'staff_collab', PLAYER: 'player_user' };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- UTILS ---
    const BingoEngine = {
      generateCard: () => {
        const getCol = (min, max) => {
          const s = new Set();
          while(s.size < 5) s.add(Math.floor(Math.random() * (max - min + 1)) + min);
          return Array.from(s).sort((a,b) => a-b);
        };
        const b=getCol(1,15), i=getCol(16,30), n=getCol(31,45), g=getCol(46,60), o=getCol(61,75);
        n[2] = 'FREE';
        const matrix = [];
        for(let r=0; r<5; r++) matrix.push([b[r], i[r], n[r], g[r], o[r]]);
        return matrix;
      }
    };

    // --- UI COMPONENTS ---

    function Navbar({ setView, currentView, userRole }) {
      return html`
        <nav class="fixed top-0 inset-x-0 z-[100] px-6 py-4">
          <div class="max-w-7xl mx-auto glass-card rounded-2xl px-6 py-3 flex justify-between items-center border-amber-500/10">
            <div class="flex items-center gap-3 cursor-pointer group" onClick=${() => setView('home')}>
              <div class="w-10 h-10 gold-gradient-bg rounded-xl flex items-center justify-center shadow-lg group-hover:rotate-12 transition-transform">
                <span class="text-xl">👑</span>
              </div>
              <span class="bingo-title text-xl font-black tracking-tight hidden sm:block">BINGO ROYALE</span>
            </div>

            <div class="flex items-center gap-1 sm:gap-4">
              <button onClick=${() => setView('home')} class="px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition ${currentView === 'home' ? 'text-amber-500 bg-amber-500/10' : 'text-slate-400 hover:text-white'}">Inicio</button>
              <button onClick=${() => setView('player')} class="px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition ${currentView === 'player' ? 'text-amber-500 bg-amber-500/10' : 'text-slate-400 hover:text-white'}">Jugar</button>
              ${(userRole === ROLES.ADMIN || userRole === ROLES.STAFF) && html`
                <button onClick=${() => setView('staff')} class="px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition ${currentView === 'staff' ? 'text-emerald-500 bg-emerald-500/10' : 'text-slate-400 hover:text-white'}">Staff</button>
              `}
              ${userRole === ROLES.ADMIN && html`
                <button onClick=${() => setView('admin')} class="px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition ${currentView === 'admin' ? 'text-indigo-500 bg-indigo-500/10' : 'text-slate-400 hover:text-white'}">Admin</button>
              `}
            </div>
          </div>
        </nav>
      `;
    }

    function HomeView({ setView }) {
      return html`
        <div class="min-h-screen flex flex-col items-center justify-center px-6 pt-20">
          <div class="text-center space-y-8 max-w-4xl fade-up">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-amber-500/10 border border-amber-500/20 text-amber-500 text-[10px] font-black uppercase tracking-[0.3em]">
              <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
              The Gold Standard of Bingo
            </div>
            <h1 class="text-6xl md:text-8xl font-black tracking-tighter leading-none text-white">
              Siente el Poder del <br/> <span class="bingo-title italic">Bingo Royale</span>
            </h1>
            <p class="text-slate-400 text-lg md:text-xl max-w-2xl mx-auto font-medium leading-relaxed">
              La plataforma más avanzada y elegante para la gestión de eventos de bingo en tiempo real. Diseñada para la excelencia.
            </p>
            
            <div class="flex flex-wrap justify-center gap-6 pt-8">
              <button onClick=${() => setView('player')} class="px-10 py-5 gold-gradient-bg text-deep-bg font-black rounded-2xl shadow-[0_20px_40px_rgba(212,175,55,0.3)] hover:scale-105 transition-all">EMPEZAR A JUGAR</button>
              <button onClick=${() => setView('admin')} class="px-10 py-5 bg-slate-900 border border-slate-800 text-white font-black rounded-2xl hover:bg-slate-800 transition-all">CONSOLA ADMIN</button>
            </div>
          </div>
        </div>
      `;
    }

    function PlayerView({ activeEvent, cards, user, onReserveCard, onRequestChange }) {
      const [name, setName] = useState('');
      const [showChangeModal, setShowChangeModal] = useState(false);
      const [changeCode, setChangeCode] = useState('');

      const myCard = useMemo(() => cards.find(c => c.playerId === user?.uid), [cards, user]);
      const availableCards = useMemo(() => cards.filter(c => c.status === 'available').sort((a,b) => a.cardNumber - b.cardNumber), [cards]);

      if (!activeEvent) return html`<div class="min-h-screen flex items-center justify-center text-slate-500 font-black tracking-widest uppercase animate-pulse">Esperando Apertura de Mesa...</div>`;

      if (!myCard) {
        return html`
          <div class="min-h-screen pt-32 pb-20 px-6 max-w-7xl mx-auto space-y-16 fade-up">
            <div class="text-center space-y-4">
              <h2 class="text-5xl font-black text-white uppercase tracking-tighter">${activeEvent.name}</h2>
              <p class="text-amber-500 font-black tracking-widest text-sm uppercase">Selecciona tu posición en la mesa</p>
            </div>

            <div class="max-w-md mx-auto glass-card p-8 rounded-3xl space-y-6">
              <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Tu Nombre de Jugador</label>
                <input type="text" value=${name} onChange=${e => setName(e.target.value)} placeholder="EJ: CASINO ROYALE" class="w-full bg-black/40 border border-slate-800 rounded-2xl p-4 text-white font-bold outline-none focus:border-amber-500 transition-all" />
              </div>
            </div>

            <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 xl:grid-cols-10 gap-4">
              ${availableCards.map(card => html`
                <button 
                  key=${card.id}
                  onClick=${() => { if(!name.trim()) return alert('Identifícate primero'); onReserveCard(card.id, name); }}
                  class="aspect-[4/5] glass-card rounded-2xl flex flex-col items-center justify-center group hover:border-amber-500 transition-all duration-500"
                >
                  <span class="text-[8px] font-black text-slate-600 uppercase mb-1">Royale</span>
                  <span class="text-3xl font-black text-slate-300 group-hover:text-amber-500 group-hover:scale-110 transition-all">${card.cardNumber}</span>
                  <div class="mt-2 w-4 h-1 bg-slate-800 rounded-full group-hover:w-8 group-hover:bg-amber-500 transition-all"></div>
                </button>
              `)}
            </div>
          </div>
        `;
      }

      const matrix = JSON.parse(myCard.numbers);
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${myCard.id}&color=05070a&bgcolor=ffffff`;

      return html`
        <div class="min-h-screen pt-32 pb-24 px-6 flex flex-col items-center fade-up">
          <div class="w-full max-w-xl space-y-8">
            <div class="flex justify-between items-end px-2">
              <div class="space-y-1">
                <p class="text-amber-500 text-[10px] font-black uppercase tracking-[0.3em]">Estado de Mesa</p>
                <h2 class="text-3xl font-black text-white uppercase tracking-tighter">${myCard.status === 'active' ? 'EN JUEGO' : 'POR VALIDAR'}</h2>
              </div>
              <button onClick=${() => setShowChangeModal(true)} class="text-[10px] font-black text-slate-500 hover:text-rose-500 transition-colors uppercase tracking-widest mb-1">Solicitar Cambio</button>
            </div>

            ${myCard.status === 'reserved' ? html`
              <div class="glass-card bg-white p-12 rounded-[3rem] text-center space-y-10 animate-in zoom-in duration-500">
                <div class="space-y-3">
                  <h3 class="text-4xl font-black text-slate-950 uppercase tracking-tighter">${myCard.playerName}</h3>
                  <div class="inline-flex px-4 py-1.5 rounded-full bg-amber-100 text-amber-700 text-[10px] font-black uppercase tracking-widest">PASE DE ENTRADA #${myCard.cardNumber}</div>
                </div>
                <div class="p-8 bg-slate-50 rounded-[3rem] inline-block border-2 border-slate-100 shadow-inner">
                  <img src=${qrUrl} class="w-64 h-64 mix-blend-multiply" />
                </div>
                <p class="text-slate-400 text-xs font-medium px-8 leading-relaxed">Presenta este código al personal del staff para activar tu cartón y comenzar el juego.</p>
              </div>
            ` : html`
              <div class="bingo-grid-container shadow-2xl">
                ${['B','I','N','G','O'].map(l => html`
                  <div class="flex items-center justify-center text-2xl font-black text-amber-500/40 pb-2">${l}</div>
                `)}
                ${matrix.map(row => row.map(cell => {
                  const isFree = cell === 'FREE';
                  const isDrawn = !isFree && activeEvent.drawnNumbers.includes(cell);
                  return html`
                    <div class="bingo-cell ${isFree ? 'bingo-cell-free' : isDrawn ? 'bingo-cell-marked' : 'bingo-cell-empty'}">
                      ${isFree ? '★' : cell}
                    </div>
                  `;
                }))}
              </div>
              
              <div class="flex justify-between items-center px-6 text-[9px] font-black text-slate-600 uppercase tracking-[0.3em]">
                <span>SERIE: ${myCard.id.slice(-8)}</span>
                <span>BINGO ROYALE v5.0</span>
              </div>
            `}
          </div>

          ${showChangeModal && html`
            <div class="fixed inset-0 z-[200] flex items-center justify-center p-6 backdrop-blur-2xl bg-black/60">
              <div class="max-w-md w-full glass-card p-12 rounded-[3rem] space-y-8 fade-up border-rose-500/20">
                <div class="text-center space-y-2">
                  <h3 class="text-3xl font-black text-white uppercase tracking-tighter">CAMBIAR MESA</h3>
                  <p class="text-slate-400 text-sm">Ingresa el código de autorización proporcionado por el staff.</p>
                </div>
                <input type="text" value=${changeCode} onChange=${e => setChangeCode(e.target.value.toUpperCase())} placeholder="000000" class="w-full bg-black/50 border border-slate-800 rounded-3xl p-6 text-center text-5xl font-black tracking-[0.4em] text-amber-500 outline-none focus:border-amber-500 transition-all" />
                <div class="flex gap-4">
                  <button onClick=${() => setShowChangeModal(false)} class="flex-1 py-4 font-black text-slate-500 hover:text-white transition uppercase text-xs tracking-widest">Cerrar</button>
                  <button onClick=${async () => { if(await onRequestChange(myCard.id, changeCode)) setShowChangeModal(false); }} class="flex-1 bg-rose-600 hover:bg-rose-700 text-white font-black py-4 rounded-2xl shadow-lg transition uppercase text-xs tracking-widest">Validar Cambio</button>
                </div>
              </div>
            </div>
          `}
        </div>
      `;
    }

    function AdminView({ userRole, activeEvent, cards, onCreateEvent, onDrawNumber, onChangePattern, onResetGame }) {
      const [eventName, setEventName] = useState('');
      const [cardCount, setCardCount] = useState(100);
      const [collabEmail, setCollabEmail] = useState('');
      const [collabs, setCollabs] = useState([]);
      const [isProcessing, setIsProcessing] = useState(false);

      useEffect(() => {
        if(userRole === ROLES.ADMIN) {
          return onSnapshot(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'staff'), (s) => {
            setCollabs(s.docs.map(d => ({id: d.id, ...d.data()})));
          });
        }
      }, [userRole]);

      const handleAddStaff = async () => {
        if(!collabEmail.trim()) return;
        const ref = doc(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'staff'));
        await setDoc(ref, {
          email: collabEmail.trim(),
          code: Math.random().toString(36).substring(2, 8).toUpperCase(),
          createdAt: Date.now()
        });
        setCollabEmail('');
      };

      if (!activeEvent && userRole === ROLES.ADMIN) {
        return html`
          <div class="min-h-screen flex items-center justify-center px-6 pt-20">
            <div class="max-w-md w-full glass-card p-12 rounded-[3rem] space-y-8 text-center fade-up">
              <h2 class="text-4xl font-black text-white uppercase tracking-tighter italic">Nueva Gala</h2>
              <div class="space-y-6 text-left">
                <div class="space-y-2">
                  <label class="text-[10px] font-black text-amber-500 uppercase tracking-widest ml-1">Nombre del Evento</label>
                  <input type="text" value=${eventName} onChange=${e => setEventName(e.target.value)} placeholder="BINGO NOCTURNO" class="w-full bg-black/40 border border-slate-800 rounded-2xl p-4 text-white font-bold outline-none focus:border-amber-500 transition-all" />
                </div>
                <div class="space-y-2">
                  <label class="text-[10px] font-black text-amber-500 uppercase tracking-widest ml-1">Cantidad de Cartones</label>
                  <input type="number" value=${cardCount} onChange=${e => setCardCount(e.target.value)} class="w-full bg-black/40 border border-slate-800 rounded-2xl p-4 text-white font-bold outline-none focus:border-amber-500 transition-all" />
                </div>
              </div>
              <button onClick=${() => onCreateEvent(eventName, cardCount)} class="w-full gold-gradient-bg text-deep-bg font-black py-5 rounded-2xl shadow-xl transition transform active:scale-95 uppercase tracking-widest text-sm">Inicializar Sistema</button>
            </div>
          </div>
        `;
      }

      if(!activeEvent) return html`<div class="min-h-screen flex items-center justify-center text-slate-500 font-black tracking-widest uppercase">Cargando Mesa Directiva...</div>`;

      const lastNumber = activeEvent.drawnNumbers[activeEvent.drawnNumbers.length - 1] || '--';
      const stats = {
        active: cards.filter(c => c.status === 'active').length,
        reserved: cards.filter(c => c.status === 'reserved').length,
        available: cards.filter(c => c.status === 'available').length
      };

      return html`
        <div class="min-h-screen pt-32 pb-20 px-6 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8 fade-up">
          <div class="lg:col-span-2 space-y-8">
            <div class="glass-card p-12 rounded-[4rem] flex flex-col items-center space-y-12 relative overflow-hidden border-amber-500/30">
              <div class="absolute top-0 right-0 p-10">
                <div class="flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 text-[10px] font-black uppercase tracking-widest">
                  <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span> Live Console
                </div>
              </div>
              
              <div class="text-center space-y-4">
                <p class="text-slate-500 font-black uppercase tracking-[0.4em] text-[10px]">Número Extraído</p>
                <div class="w-72 h-72 rounded-full gold-gradient-bg p-1 shadow-[0_0_60px_rgba(212,175,55,0.3)]">
                  <div class="w-full h-full rounded-full bg-slate-950 flex items-center justify-center border-8 border-white/5">
                    <span class="text-[10rem] font-black tracking-tighter text-white leading-none">${lastNumber}</span>
                  </div>
                </div>
              </div>

              <button onClick=${async () => { setIsProcessing(true); await onDrawNumber(); setIsProcessing(false); }} disabled=${isProcessing || activeEvent.drawnNumbers.length >= 75} 
                class="w-full max-w-md gold-gradient-bg text-deep-bg font-black text-2xl py-6 rounded-3xl shadow-2xl transition-all transform active:scale-95 hover:brightness-110">
                ${isProcessing ? 'PROCESANDO...' : 'EXTRAER BALOTA'}
              </button>
            </div>

            ${userRole === ROLES.ADMIN && html`
              <div class="glass-card p-10 rounded-[3rem] space-y-8">
                <h3 class="text-2xl font-black text-white uppercase tracking-tighter flex items-center gap-4">
                  <div class="w-2 h-10 bg-amber-500 rounded-full"></div> Gestión de Staff
                </h3>
                <div class="flex gap-4">
                  <input type="email" value=${collabEmail} onChange=${e => setCollabEmail(e.target.value)} placeholder="EMAIL@ROYALE.COM" class="flex-1 bg-black/40 border border-slate-800 rounded-2xl p-4 text-white font-bold outline-none focus:border-amber-500" />
                  <button onClick=${handleAddStaff} class="bg-white text-black font-black px-10 rounded-2xl hover:bg-slate-200 transition-colors uppercase text-xs tracking-widest">Añadir</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  ${collabs.map(c => html`
                    <div key=${c.id} class="bg-black/40 p-6 rounded-[2rem] border border-slate-800 flex justify-between items-center group hover:border-amber-500/50 transition-colors">
                      <div class="space-y-1">
                        <p class="text-white font-bold text-sm">${c.email}</p>
                        <p class="text-[8px] text-slate-500 font-black uppercase tracking-widest">Colaborador Oficial</p>
                      </div>
                      <div class="text-right">
                        <p class="text-amber-500 font-black text-2xl tracking-widest">${c.code}</p>
                        <p class="text-[8px] text-slate-600 font-black uppercase">Auth Code</p>
                      </div>
                    </div>
                  `)}
                </div>
              </div>
            `}
          </div>

          <div class="space-y-8">
            <div class="glass-card p-8 rounded-[2.5rem] space-y-8">
              <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">Métricas de Gala</h3>
              <div class="space-y-4">
                <div class="bg-black/40 p-6 rounded-2xl border border-slate-800 flex justify-between items-center">
                  <span class="text-slate-400 font-bold text-sm">En Mesa</span>
                  <span class="text-3xl font-black text-emerald-500">${stats.active}</span>
                </div>
                <div class="bg-black/40 p-6 rounded-2xl border border-slate-800 flex justify-between items-center">
                  <span class="text-slate-400 font-bold text-sm">Esperando</span>
                  <span class="text-3xl font-black text-amber-500">${stats.reserved}</span>
                </div>
                <div class="bg-black/40 p-6 rounded-2xl border border-slate-800 flex justify-between items-center">
                  <span class="text-slate-400 font-bold text-sm">Disponibles</span>
                  <span class="text-3xl font-black text-indigo-500">${stats.available}</span>
                </div>
              </div>
            </div>

            <div class="glass-card p-8 rounded-[2.5rem] space-y-6">
              <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">Configuración</h3>
              <div class="space-y-4">
                <label class="block text-[10px] font-black text-slate-600 uppercase tracking-widest ml-1">Modo de Victoria</label>
                <select value=${activeEvent.pattern} onChange=${e => onChangePattern(e.target.value)} class="w-full bg-black/40 border border-slate-800 rounded-2xl p-4 text-white font-black outline-none focus:border-amber-500 transition-all">
                  <option value="full">🏆 CARTÓN LLENO</option>
                  <option value="line">➖ LÍNEA RECTA</option>
                  <option value="four_corners">💠 4 ESQUINAS</option>
                  <option value="letter_x">❌ LETRA X</option>
                </select>
                <button onClick=${onResetGame} class="w-full py-4 text-rose-500 font-black text-[10px] uppercase tracking-[0.2em] hover:bg-rose-500/5 rounded-2xl transition-colors">Reiniciar Bolillero</button>
              </div>
            </div>

            <div class="glass-card p-8 rounded-[2.5rem] space-y-4">
              <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">Invitación Directa</h3>
              <div class="bg-black/40 p-4 rounded-xl border border-slate-800 flex items-center justify-between">
                <code class="text-[10px] text-indigo-400 truncate mr-4">${window.location.href}</code>
                <button onClick=${() => {navigator.clipboard.writeText(window.location.href); alert('Copiado');}} class="bg-indigo-600/20 text-indigo-400 p-2 rounded-lg hover:bg-indigo-600 hover:text-white transition-all">📋</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function ScannerView({ user, onActivateCard }) {
      const [log, setLog] = useState({ text: 'ESPERANDO TOKEN QR...', type: 'info' });
      const [myStaffData, setMyStaffData] = useState(null);
      const [emailLink, setEmailLink] = useState('');

      useEffect(() => {
        return onSnapshot(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'staff'), (s) => {
          const found = s.docs.find(d => d.data().uid === user.uid);
          if(found) setMyStaffData({id: found.id, ...found.data()});
        });
      }, [user]);

      const handleLink = async () => {
        const q = query(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'staff'), where('email', '==', emailLink.trim()));
        const s = await getDocs(q);
        if(s.empty) return alert('Este email no ha sido autorizado por la administración.');
        await updateDoc(s.docs[0].ref, { uid: user.uid });
        alert('Identidad de Staff vinculada.');
      };

      useEffect(() => {
        const scanner = new Html5QrcodeScanner("qr-reader", { fps: 15, qrbox: 280 }, false);
        scanner.render(async (text) => {
          scanner.pause();
          setLog({ text: 'VERIFICANDO CREDENCIAL...', type: 'info' });
          const res = await onActivateCard(text);
          setLog({ text: res.msg.toUpperCase(), type: res.success ? 'success' : 'error' });
          setTimeout(() => scanner.resume(), 3000);
        }, () => {});
        return () => scanner.clear().catch(() => {});
      }, []);

      return html`
        <div class="min-h-screen pt-32 pb-20 px-6 max-w-2xl mx-auto space-y-8 fade-up">
          ${!myStaffData ? html`
            <div class="glass-card p-12 rounded-[3rem] text-center space-y-8 border-amber-500/30">
              <h3 class="text-3xl font-black text-white uppercase tracking-tighter italic">Validación Staff</h3>
              <p class="text-slate-400 text-sm">Vincula tu cuenta con el email autorizado por el Admin para acceder a las herramientas de validación.</p>
              <input type="email" value=${emailLink} onChange=${e => setEmailLink(e.target.value)} placeholder="TU@ROYALE.COM" class="w-full bg-black/40 border border-slate-800 rounded-2xl p-4 text-white font-bold outline-none focus:border-amber-500" />
              <button onClick=${handleLink} class="w-full gold-gradient-bg text-deep-bg font-black py-5 rounded-2xl shadow-xl transition uppercase tracking-widest text-xs">Vincular Identidad</button>
            </div>
          ` : html`
            <div class="gold-gradient-bg p-10 rounded-[3rem] text-deep-bg shadow-2xl space-y-2 relative overflow-hidden">
              <div class="absolute top-4 right-6 text-[8px] font-black uppercase tracking-widest opacity-40 italic">Royale Staff Member</div>
              <p class="text-[10px] font-black uppercase tracking-[0.4em] opacity-60">Código de Autorización de Mesa</p>
              <h3 class="text-7xl font-black tracking-[0.5em] leading-none">${myStaffData.code}</h3>
              <p class="text-[9px] font-bold mt-6 opacity-50 uppercase tracking-widest">Proporciona este código al jugador solo bajo supervisión.</p>
            </div>
          `}

          <div class="glass-card p-10 rounded-[3rem] space-y-8 text-center border-emerald-500/20">
            <div class="space-y-1">
              <h3 class="text-2xl font-black text-white uppercase tracking-tighter italic">Escáner de Recepción</h3>
              <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em]">Validación Biométrica de Cartones</p>
            </div>
            
            <div id="qr-reader" class="overflow-hidden rounded-[2.5rem] bg-black border-4 border-slate-900 shadow-inner"></div>
            
            <div class="p-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] transition-all duration-500 border
              ${log.type === 'success' ? 'bg-emerald-500/10 text-emerald-500 border-emerald-500/30' : 
                log.type === 'error' ? 'bg-rose-500/10 text-rose-400 border-rose-500/30' : 
                'bg-black/40 text-slate-500 border-slate-800'}">
              ${log.text}
            </div>
          </div>
        </div>
      `;
    }

    // --- MAIN APP ---
    function App() {
      const [user, setUser] = useState(null);
      const [userRole, setUserRole] = useState(ROLES.PLAYER);
      const [view, setView] = useState('home');
      const [events, setEvents] = useState([]);
      const [cards, setCards] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, async (u) => {
          if (!u) {
            await signInAnonymously(auth);
          } else {
            setUser(u);
            const usersRef = collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'users');
            const snap = await getDocs(usersRef);
            if(snap.empty) {
              await setDoc(doc(usersRef, u.uid), { role: ROLES.ADMIN });
              setUserRole(ROLES.ADMIN);
            } else {
              const uSnap = await getDoc(doc(usersRef, u.uid));
              if(uSnap.exists()) setUserRole(uSnap.data().role);
              else {
                const sSnap = await getDocs(query(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'staff'), where('uid', '==', u.uid)));
                if(!sSnap.empty) setUserRole(ROLES.STAFF);
              }
            }
            setLoading(false);
          }
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const unsubEvents = onSnapshot(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'events'), (s) => {
          setEvents(s.docs.map(d => ({id: d.id, ...d.data()})));
        });
        const unsubCards = onSnapshot(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'cards'), (s) => {
          setCards(s.docs.map(d => ({id: d.id, ...d.data()})));
        });
        return () => { unsubEvents(); unsubCards(); };
      }, [user]);

      const activeEvent = useMemo(() => events.find(e => e.status === 'active') || events[0], [events]);

      const handleCreateEvent = async (name, count) => {
        const batch = writeBatch(db);
        const eRef = doc(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'events'));
        batch.set(eRef, {
          name: name || 'Gala Bingo Royale',
          status: 'active',
          drawnNumbers: [],
          pattern: 'full',
          createdAt: Date.now()
        });
        for(let i=1; i<=count; i++) {
          const cRef = doc(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'cards'));
          batch.set(cRef, {
            eventId: eRef.id,
            cardNumber: i,
            numbers: JSON.stringify(BingoEngine.generateCard()),
            status: 'available',
            playerId: null,
            playerName: null,
            createdAt: Date.now()
          });
        }
        await batch.commit();
      };

      const handleReserveCard = async (cardId, name) => {
        await updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'cards', cardId), {
          status: 'reserved',
          playerId: user.uid,
          playerName: name,
          reservedAt: Date.now()
        });
      };

      const handleDrawNumber = async () => {
        const available = Array.from({length:75}, (_,i)=>i+1).filter(n => !activeEvent.drawnNumbers.includes(n));
        if(available.length === 0) return;
        const next = available[Math.floor(Math.random() * available.length)];
        await updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'events', activeEvent.id), {
          drawnNumbers: [...activeEvent.drawnNumbers, next]
        });
      };

      const handleRequestChange = async (cardId, code) => {
        const s = await getDocs(query(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'staff'), where('code', '==', code)));
        if(s.empty) { alert('Código de Staff Inválido'); return false; }
        await updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'cards', cardId), {
          status: 'available',
          playerId: null,
          playerName: null
        });
        return true;
      };

      const handleActivateCard = async (id) => {
        const c = cards.find(x => x.id === id);
        if(!c) return { success: false, msg: 'Error: Cartón no registrado' };
        if(c.status === 'active') return { success: false, msg: 'Aviso: Ya está en juego' };
        await updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'cards', id), { status: 'active' });
        return { success: true, msg: '¡Identidad Validada!' };
      };

      if (loading) return html`
        <div class="min-h-screen flex flex-col items-center justify-center space-y-8 bg-black">
          <div class="relative w-24 h-24">
            <div class="absolute inset-0 border-4 border-amber-500/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
          </div>
          <div class="text-center space-y-2">
            <h1 class="bingo-title text-4xl">BINGO ROYALE</h1>
            <p class="text-slate-600 text-[10px] font-black uppercase tracking-[0.5em]">Cargando Protocolos de Seguridad</p>
          </div>
        </div>
      `;

      return html`
        <div class="min-h-screen bg-slate-950">
          <${Navbar} setView=${setView} currentView=${view} userRole=${userRole} />
          
          <main class="transition-all duration-700">
            ${view === 'home' ? html`<${HomeView} setView=${setView} />` : 
              view === 'player' ? html`<${PlayerView} activeEvent=${activeEvent} cards=${cards} user=${user} onReserveCard=${handleReserveCard} onRequestChange=${handleRequestChange} />` :
              view === 'admin' ? html`<${AdminView} userRole=${userRole} activeEvent=${activeEvent} cards=${cards} onCreateEvent=${handleCreateEvent} onDrawNumber=${handleDrawNumber} onChangePattern=${(p) => updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'events', activeEvent.id), {pattern:p})} onResetGame=${() => updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'events', activeEvent.id), {drawnNumbers:[]})} />` :
              view === 'staff' ? html`<${ScannerView} user=${user} onActivateCard=${handleActivateCard} />` :
              null}
          </main>
        </div>
      `;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
