<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👑</text></svg>">
  <title>Bingo Royale Premium - Senior Enterprise Edition</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'deep-bg': '#05070a',
          }
        }
      },
      plugins: [
        // Los plugins se cargan vía script o configuración si el CDN lo permite, 
        // pero para evitar el warning de producción, minimizamos el uso del CDN script con parámetros.
      ]
    }
  </script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Bungee+Shade&display=swap');

    :root {
      --gold: #D4AF37;
      --gold-light: #F9E076;
      --gold-dark: #996515;
      --royal-blue: #1e3a8a;
      --deep-bg: #05070a;
      --card-bg: #0f172a;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--deep-bg);
      color: #f1f5f9;
      overflow-x: hidden;
    }

    .bingo-title {
      font-family: 'Bungee Shade', cursive;
      background: linear-gradient(to bottom, var(--gold-light), var(--gold), var(--gold-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
    }

    .glass-card {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(212, 175, 55, 0.2);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .gold-gradient-bg {
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
    }

    .bingo-cell {
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      border-radius: 0.5rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 1.1rem;
    }

    .bingo-cell-empty {
      background: rgba(255, 255, 255, 0.02);
      color: rgba(255, 255, 255, 0.3);
    }

    .bingo-cell-marked {
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      color: var(--deep-bg);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
    }

    .bingo-cell-free {
      background: linear-gradient(135deg, #6366f1, #4338ca);
      color: white;
    }

    .bingo-grid-mini {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.25rem;
      padding: 0.75rem;
      background: rgba(0,0,0,0.3);
      border-radius: 1rem;
      border: 1px solid rgba(212, 175, 55, 0.2);
    }

    .bingo-grid-mini .bingo-cell {
      font-size: 0.65rem;
      border-radius: 0.25rem;
    }

    .fade-up {
      animation: fadeUp 0.6s ease-out forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    /* Layout isolation */
    .view-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Confetti */
    .confetti-container {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      background: var(--gold);
      animation: confetti-fall 3s linear infinite;
    }

    @keyframes confetti-fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .jackpot-glow {
      animation: jackpot-glow 1s ease-in-out infinite alternate;
    }

    @keyframes jackpot-glow {
      from { filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4)); }
      to { filter: drop-shadow(0 0 60px rgba(212, 175, 55, 0.8)); }
    }
  </style>
</head>
<body class="selection:bg-amber-500 selection:text-white">

  <div id="root"></div>

  <script type="module">
    import React, { useState, useEffect, useMemo, useCallback, useRef } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import htm from 'https://esm.sh/htm';
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, writeBatch, getDoc, getDocs, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const html = htm.bind(React.createElement);

    // --- CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyCFdkfrUi1FM-jktyB4IOdWt4PYe5v-gXU",
      authDomain: "bingo-b7670.firebaseapp.com",
      projectId: "bingo-b7670",
      storageBucket: "bingo-b7670.firebasestorage.app",
      messagingSenderId: "529198823545",
      appId: "1:529198823545:web:58cf2abcf93a26ce933ca8"
    };

    const APP_NAMESPACE = 'bingo_royale_enterprise_final';
    const ROLES = { ADMIN: 'super_admin', STAFF: 'staff_collab', PLAYER: 'player_user' };
    const SYSTEM_DOMAIN = '@royale.internal';
    const MASTER_CHANGE_CODE = '202620';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    auth.languageCode = 'es';
    const db = getFirestore(app);

    // --- SENIOR SERVICES & UTILS ---
    const BingoEngine = {
      getLetter: (num) => {
        if (num <= 15) return 'B';
        if (num <= 30) return 'I';
        if (num <= 45) return 'N';
        if (num <= 60) return 'G';
        return 'O';
      },
      slugify: (text) => {
        return text.toString().toLowerCase().trim()
          .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // Remove accents
          .replace(/\s+/g, '-')           // Replace spaces with -
          .replace(/[^\w\-]+/g, '')       // Remove all non-word chars
          .replace(/\-\-+/g, '-')         // Replace multiple - with single -
          .replace(/^-+/, '')             // Trim - from start
          .replace(/-+$/, '');            // Trim - from end
      },
      generateCard: () => {
        const getCol = (min, max) => {
          const s = new Set();
          while(s.size < 5) s.add(Math.floor(Math.random() * (max - min + 1)) + min);
          return Array.from(s).sort((a,b) => a-b);
        };
        const b=getCol(1,15), i=getCol(16,30), n=getCol(31,45), g=getCol(46,60), o=getCol(61,75);
        n[2] = 'FREE';
        const flat = [];
        // Generar por filas para que el render sea natural: B1, I16, N31, G46, O61...
        for(let r=0; r<5; r++) {
          flat.push(b[r], i[r], n[r], g[r], o[r]);
        }
        return flat;
      }
    };

    const VoiceService = {
      playSuccess: () => {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
          gain.gain.setValueAtTime(0.1, ctx.currentTime);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        } catch(e) {}
      },
      playJackpot: () => {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const notes = [523.25, 659.25, 783.99, 1046.50];
          notes.forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, ctx.currentTime + (i * 0.1));
            gain.gain.setValueAtTime(0.1, ctx.currentTime + (i * 0.1));
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (i * 0.1) + 0.5);
            osc.start(ctx.currentTime + (i * 0.1));
            osc.stop(ctx.currentTime + (i * 0.1) + 0.5);
          });
        } catch(e) {}
      },
      speak: (text, count = 1) => {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'es-ES'; utterance.rate = 0.9;
        let repeated = 0;
        utterance.onend = () => {
          repeated++;
          if (repeated < count) setTimeout(() => window.speechSynthesis.speak(utterance), 500);
        };
        window.speechSynthesis.speak(utterance);
      }
    };

    // --- ATOMIC COMPONENTS (MEMOIZED) ---

    const BingoCell = React.memo(({ cell, isDrawn, isMarked, onToggle, idx }) => {
      const isFree = cell === 'FREE';
      const handleClick = useCallback(() => onToggle(cell, idx), [cell, idx, onToggle]);

      return html`
        <div 
          onClick=${handleClick} 
          className=${`bingo-cell cursor-pointer text-xl sm:text-4xl border-2 transition-all duration-300 transform active:scale-90 ${
            isMarked ? 
              'bg-amber-500 text-deep-bg border-amber-300 shadow-[0_0_30px_rgba(212,175,55,0.4)] rotate-3' : 
              isDrawn ? 
                'bg-amber-500/10 text-amber-500 border-amber-500/30 animate-pulse' : 
                'bg-white/5 text-slate-300 border-white/5 hover:border-white/20'
          }`}
        >
          ${isFree ? '★' : cell}
        </div>
      `;
    });

    const BingoCard = React.memo(({ card, drawnNumbersSet, onToggleMark }) => {
      const numbers = card.numbers || [];
      const markTimes = card.markTimes || {};

      return html`
        <div className="p-4 sm:p-10 rounded-[4rem] border-8 border-amber-500 bg-slate-900 shadow-[0_0_100px_rgba(212,175,55,0.15)] space-y-8 relative overflow-hidden">
          <div className="absolute inset-0 bg-gradient-to-br from-amber-500/5 via-transparent to-transparent pointer-events-none"></div>
          
          <div className="grid grid-cols-5 gap-3 sm:gap-6 relative z-10">
            ${['B','I','N','G','O'].map(l => html`
              <div key=${l} className="aspect-square flex items-center justify-center text-3xl sm:text-5xl font-black text-amber-500/10 italic">${l}</div>
            `)}
            
            ${numbers.map((cell, idx) => {
              const isFree = cell === 'FREE';
              const isDrawn = isFree || drawnNumbersSet.has(Number(cell));
              const isMarked = markTimes[cell] || isFree;
              
              return html`
                <${BingoCell} 
                  key=${idx}
                  cell=${cell}
                  isDrawn=${isDrawn}
                  isMarked=${isMarked}
                  onToggle=${onToggleMark}
                  idx=${idx}
                />
              `;
            })}
          </div>

          <div className="flex justify-between items-center pt-4 border-t border-white/5 relative z-10">
             <div className="flex items-center gap-2">
               <div className="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
               <p className="text-[10px] font-black text-emerald-500 uppercase tracking-widest">Conectado a la Tómbola Royale</p>
             </div>
             <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest">ID: ${card.id.substring(0,8)}</p>
          </div>
        </div>
      `;
    });

    const DrawnNumberDisplay = React.memo(({ lastNumber }) => {
       const letter = useMemo(() => lastNumber ? BingoEngine.getLetter(lastNumber) : '', [lastNumber]);
       return html`
        <div className="flex-1 glass-card rounded-[4rem] border-amber-500/30 flex flex-col items-center justify-center relative overflow-hidden">
          <div className="absolute inset-0 bg-gradient-to-b from-amber-500/5 to-transparent"></div>
          <p className="text-amber-500 font-black text-xl uppercase tracking-[0.5em] mb-4">Última Balota</p>
          <div className="relative">
            <div className="absolute inset-0 bg-amber-500 blur-[100px] opacity-20"></div>
            <span className="text-[20rem] font-black leading-none tracking-tighter italic drop-shadow-[0_0_50px_rgba(212,175,55,0.4)]">
              ${lastNumber ? html`
                <span className="text-amber-500/30 mr-[-0.1em]">${letter}</span>
                <span>${lastNumber}</span>
              ` : '--'}
            </span>
          </div>
        </div>
      `;
    });

    // --- CUSTOM HOOKS ---

    const useBingoData = (user, currentSlug) => {
      const [events, setEvents] = useState([]);
      const [cards, setCards] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (!user) return;
        
        const unsubEvents = onSnapshot(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'events'), (s) => {
          setEvents(s.docs.map(d => ({id: d.id, ...d.data()})));
        });

        const unsubCards = onSnapshot(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'cards'), (s) => {
          setCards(s.docs.map(d => ({id: d.id, ...d.data()})));
          setLoading(false);
        });

        return () => {
          unsubEvents();
          unsubCards();
        };
      }, [user]);

      const activeEvent = useMemo(() => {
        if (currentSlug) {
          const found = events.find(e => e.slug === currentSlug);
          if (found) return found;
        }
        return events.find(e => e.status === 'active') || events.sort((a,b) => b.createdAt - a.createdAt)[0];
      }, [events, currentSlug]);

      const drawnNumbersSet = useMemo(() => new Set(activeEvent?.drawnNumbers || []), [activeEvent?.drawnNumbers]);

      return { events, cards, activeEvent, drawnNumbersSet, loading };
    };

    const useAuthManager = () => {
      const [user, setUser] = useState(null);
      const [userRole, setUserRole] = useState(ROLES.PLAYER);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, async (u) => {
          try {
            if (!u) {
              await signInAnonymously(auth);
            } else {
              setUser(u);
              const uSnap = await getDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'users', u.uid));
              if (uSnap.exists()) {
                setUserRole(uSnap.data().role || ROLES.PLAYER);
              } else {
                setUserRole(ROLES.PLAYER);
              }
            }
          } catch (e) {
            console.error("Auth Hook Error:", e);
          } finally {
            setLoading(false);
          }
        });
        return () => unsubscribe();
      }, []);

      return { user, userRole, loading };
    };

    // --- SENIOR ROUTING SYSTEM (CLEAN URL SUPPORT) ---
    const useRouting = () => {
      const getInitialPath = useCallback(() => {
        // Soporte para #/slug y /slug (si el servidor lo permite)
        const hash = window.location.hash;
        if (hash) return hash;
        
        const path = window.location.pathname;
        // Si hay un path que no sea index.html o raíz, tratarlo como slug
        if (path && path !== '/' && !path.endsWith('index.html')) {
          return '#' + path;
        }
        return '#/';
      }, []);

      const [path, setPath] = useState(getInitialPath());

      useEffect(() => {
        const handleHashChange = () => setPath(window.location.hash || '#/');
        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      const navigate = useCallback((to) => {
        window.location.hash = to;
      }, []);

      const getCleanBaseUrl = useCallback(() => {
        return window.location.origin + window.location.pathname.replace('index.html', '');
      }, []);

      const routeInfo = useMemo(() => {
        const cleanPath = path.replace('#', '');
        const [rawPath, queryString] = cleanPath.split('?');
        const segments = rawPath.split('/').filter(Boolean);
        const queryParams = new URLSearchParams(queryString || '');
        
        if (segments[0] === 'admin') return { type: 'admin' };
        if (segments[0] === 'staff') return { type: 'staff', email: queryParams.get('email') };
        if (segments[0] === 'display') return { type: 'display' };
        if (segments[0] === 'card') return { type: 'shared_card', cardId: segments[1] };
        if (segments.length > 0) return { type: 'player', eventSlug: segments[0] };
        return { type: 'home' };
      }, [path]);

      return { ...routeInfo, navigate, getCleanBaseUrl };
    };

    // --- UI COMPONENTS ---

    const MiniCard = React.memo(({ card, onReserve, playerName }) => {
      const numbers = card.numbers || [];
      return html`
        <div className="glass-card p-6 rounded-[2.5rem] space-y-6 hover:border-amber-500/50 transition-all group fade-up border-2 border-white/5">
          <div className="flex justify-between items-center">
            <span className="text-xs font-black text-amber-500 uppercase tracking-widest">Cartón #${card.cardNumber}</span>
            <div className="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.5)]"></div>
          </div>
          
          <div className="grid grid-cols-5 gap-2 p-5 bg-black/40 rounded-[2rem] border border-amber-500/10 shadow-inner">
            ${['B','I','N','G','O'].map(l => html`
              <div key=${l} className="flex items-center justify-center text-xs font-black text-amber-500/40 pb-2 border-b border-amber-500/10">${l}</div>
            `)}
            ${numbers.map((cell, idx) => html`
              <div key=${idx} className=${`aspect-square flex items-center justify-center text-sm md:text-base font-black rounded-xl transition-colors ${cell === 'FREE' ? 'bg-indigo-600 text-white shadow-[0_0_15px_rgba(79,70,229,0.4)]' : 'bg-white/5 text-slate-300 hover:bg-white/10'}`}>
                ${cell === 'FREE' ? '★' : cell}
              </div>
            `)}
          </div>

          <button onClick=${() => onReserve(card.id, playerName)} className="w-full py-4 bg-amber-500 text-deep-bg hover:brightness-110 text-xs font-black uppercase tracking-widest rounded-2xl shadow-lg transition-all transform active:scale-95">
            Elegir Cartón
          </button>
        </div>
      `;
    });

    function PlayerView({ activeEvent, cards, user, onReserveCard, onRequestChange, onLoginGoogle, onLogout, onShareCard }) {
      const [showChangeModal, setShowChangeModal] = useState(false);
      const [changeCode, setChangeCode] = useState('');
      const [qrModalCard, setQrModalCard] = useState(null);
      const [currentPage, setCurrentPage] = useState(0);
      const [playerSubView, setPlayerSubView] = useState('game'); // 'game' or 'catalog'

      const myCards = useMemo(() => cards.filter(c => c.playerId === user?.uid), [cards, user]);
      const activeCards = useMemo(() => myCards.filter(c => c.status === 'active'), [myCards]);
      const reservedCards = useMemo(() => myCards.filter(c => c.status === 'reserved'), [myCards]);
      const availableCards = useMemo(() => cards.filter(c => c.status === 'available').sort((a,b) => a.cardNumber - b.cardNumber), [cards]);

      const pageSize = 10;
      const totalPages = Math.ceil(availableCards.length / pageSize);
      const paginatedCards = useMemo(() => {
        return availableCards.slice(currentPage * pageSize, (currentPage + 1) * pageSize);
      }, [availableCards, currentPage]);

      useEffect(() => {
        if (currentPage >= totalPages && totalPages > 0) {
          setCurrentPage(totalPages - 1);
        }
      }, [totalPages, currentPage]);

      // AUTO-SWITCH TO CATALOG IF NO ACTIVE CARDS
      useEffect(() => {
        if (activeCards.length === 0) setPlayerSubView('catalog');
      }, [activeCards.length]);

      if (!activeEvent) return html`<div class="min-h-screen flex items-center justify-center text-slate-500 font-black tracking-widest uppercase animate-pulse">Esperando Apertura de Mesa Royale...</div>`;

      // GALA FINALIZADA SCREEN (SENIOR PREMIUN)
      if (activeEvent.status === 'finished') {
        return html`
          <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center space-y-12 bg-[#05070a]">
            <div class="space-y-6">
              <div class="w-24 h-24 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto shadow-[0_0_50px_rgba(212,175,55,0.2)]">
                <span class="text-5xl">🏆</span>
              </div>
              <div class="space-y-2">
                <span class="text-amber-500 font-black text-[10px] uppercase tracking-[0.6em]">Evento Concluido</span>
                <h1 class="bingo-title text-7xl italic">${activeEvent.name}</h1>
                <p class="text-slate-500 font-bold uppercase tracking-widest text-xs pt-4 italic">La gala ha finalizado. Todos los cartones han sido cerrados.</p>
              </div>
            </div>
            
            <button onClick=${onLogout} class="px-12 py-5 bg-white/5 hover:bg-white text-white hover:text-black rounded-3xl font-black text-xs uppercase tracking-[0.3em] transition-all border border-white/10 shadow-2xl">
              Salir de la Mesa
            </button>
          </div>
        `;
      }

      // LOGIN SCREEN FOR PLAYERS WITHOUT GOOGLE
      if (!user || user.isAnonymous) {
        return html`
          <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center space-y-12 bg-[#05070a]">
            <div class="space-y-4">
              <span class="text-amber-500 font-black text-[10px] uppercase tracking-[0.5em]">Invitación VIP</span>
              <h1 class="bingo-title text-7xl italic">${activeEvent.name}</h1>
              <div class="h-px w-32 mx-auto bg-amber-500/20"></div>
              <p class="text-slate-400 font-medium text-sm max-w-sm mx-auto leading-relaxed">
                Para participar en esta gala exclusiva y reservar tus cartones, es necesario validar tu identidad con Google.
              </p>
            </div>

            <button onClick=${onLoginGoogle} class="glass-card px-10 py-6 rounded-3xl border-amber-500/30 hover:border-amber-500 transition-all group flex items-center gap-6">
              <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6" />
              </div>
              <div class="text-left">
                <p class="text-white font-black text-lg uppercase tracking-tighter">Entrar con Google</p>
                <p class="text-amber-500 font-black text-[8px] uppercase tracking-widest">Acceso Seguro Royale</p>
              </div>
            </button>

            <div class="pt-10 opacity-30">
               <p class="text-[8px] text-slate-500 font-black uppercase tracking-[0.3em]">Powered by Royale Enterprise</p>
            </div>
          </div>
        `;
      }

      // FULLSCREEN GAME MODE IF CARD IS ACTIVE AND VIEW IS GAME
      if (activeCards.length > 0 && playerSubView === 'game') {
        return html`

                    <${BingoCard} 
                      card=${card} 
                      drawnNumbersSet=${drawnNumbersSet} 
                      onToggleMark=${async (cell) => {
                        const isFree = cell === 'FREE';
                        
                        // RESTRICCIÓN SENIOR: Solo permitir marcar si el número ha salido en la tómbola
                        if (!isFree && !drawnNumbersSet.has(Number(cell))) {
                          VoiceService.speak(`Ese número todavía no ha salido`, 1);
                          return;
                        }

                        const newMarkTimes = { ...markTimes };
                        if (newMarkTimes[cell]) delete newMarkTimes[cell];
                        else {
                          newMarkTimes[cell] = Date.now();

                    <button onClick=${() => onShareCard(card.id)} class="w-full py-5 bg-indigo-500/10 hover:bg-indigo-500 text-indigo-400 hover:text-white rounded-3xl text-xs font-black uppercase tracking-widest transition-all border border-indigo-500/20">

            <!-- MODAL CAMBIO (DENTRO DE FULLSCREEN) -->
            ${showChangeModal && html`

                  <div class="flex gap-4">

                    <button onClick=${async () => { if(await onRequestChange(activeCards[0].id, changeCode)) setShowChangeModal(false); }} class="flex-1 bg-rose-600 hover:bg-rose-700 text-white font-black py-4 rounded-2xl shadow-lg transition uppercase text-[10px] tracking-widest">Liberar Cartón</button>
                  </div>
                </div>

      }

      return html`

                  <p class="text-white font-black text-sm uppercase tracking-tighter">${user.displayName}</p>

                </button>

            <!-- APARTADO: MIS CARTONES RESERVADOS (PENDIENTES DE QR) -->
            ${reservedCards.length > 0 ? html`
              <div class="space-y-6 fade-up">

                  <div class="h-px flex-1 bg-gradient-to-r from-transparent via-slate-800 to-transparent"></div>

                  <div class="h-px flex-1 bg-gradient-to-r from-transparent via-slate-800 to-transparent"></div>
                </div>
                
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                  ${reservedCards.map(card => html`
                    <div key=${card.id} onClick=${() => setQrModalCard(card)} class="glass-card p-6 rounded-[2.5rem] border-amber-500/20 hover:border-amber-500 transition-all cursor-pointer group text-center space-y-4 relative">

                      </div>
                    </div>
                  `)}
                </div>

          <!-- SELECCIÓN DE CARTONES -->

              <div class="h-px flex-1 bg-gradient-to-r from-transparent via-slate-800 to-transparent"></div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-5 gap-8">
              ${paginatedCards.map(card => html`<${MiniCard} key=${card.id} card=${card} onReserve=${onReserveCard} playerName=${user.displayName} />`)}
            </div>
            
            ${totalPages > 1 && html`
              <div class="flex flex-col md:flex-row justify-center items-center gap-8 pt-12 border-t border-white/5">
                <button 
                  disabled=${currentPage === 0}
                  onClick=${() => { setCurrentPage(p => p - 1); window.scrollTo({top: 0, behavior: 'smooth'}); }}
                  class="w-full md:w-auto px-12 py-4 bg-white/5 hover:bg-white hover:text-black disabled:opacity-20 text-white rounded-2xl font-black text-xs uppercase tracking-widest transition-all shadow-xl border border-white/10"
                >

                </button>
                
                <div class="flex items-center gap-4">
                  <span class="text-amber-500 font-black text-sm uppercase tracking-[0.3em]">
                    Página ${currentPage + 1} <span class="text-slate-600 mx-2">/</span> ${totalPages}
                  </span>
                </div>

                <button 
                  disabled=${currentPage >= totalPages - 1}
                  onClick=${() => { setCurrentPage(p => p + 1); window.scrollTo({top: 0, behavior: 'smooth'}); }}

                  Siguiente →

              </div>

            ${availableCards.length === 0 && html`

              </div>

          <!-- VENTANA EMERGENTE QR (MODAL) -->

              <div class="max-w-md w-full glass-card bg-white p-10 rounded-[3.5rem] text-center space-y-8 animate-in zoom-in duration-300" onClick=${e => e.stopPropagation()}>
                <div class="flex justify-between items-start">
                <div className="text-center space-y-1">
                <p className="text-amber-600 text-[10px] font-black uppercase tracking-widest">Credencial Digital</p>
                <h3 className="text-3xl font-black text-slate-950 uppercase tracking-tighter">Mesa #${qrModalCard.cardNumber}</h3>
              </div>
                  <button onClick=${() => setQrModalCard(null)} class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 hover:text-slate-900 transition-colors">✕</button>

                <div class="p-8 bg-slate-50 rounded-[3rem] inline-block border-2 border-slate-100 shadow-inner">
                  <img src=${`https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${qrModalCard.id}&color=05070a&bgcolor=ffffff`} class="w-64 h-64 mix-blend-multiply" />
                </div>
                
                <div class="space-y-4">
                  <p class="text-slate-500 text-xs font-medium px-6 leading-relaxed italic">Presenta este código al staff para autorizar tu participación en la gala.</p>

    function Navbar({ setView, currentView, userRole, onLogout }) {
      return html`

            </div>
            
            <div className="flex items-center gap-2">
              <button onClick=${() => setView('display')} className=${`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${currentView === 'display' ? 'bg-amber-500 text-deep-bg' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                Proyección
              </button>
              ${userRole === ROLES.ADMIN || userRole === ROLES.STAFF ? html`
                <button onClick=${() => setView('staff')} className=${`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${currentView === 'staff' ? 'bg-amber-500 text-deep-bg' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                  Staff
                </button>
              ` : null}
              ${userRole === ROLES.ADMIN ? html`
                <button onClick=${() => setView('admin')} className=${`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${currentView === 'admin' ? 'bg-amber-500 text-deep-bg' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                  Admin
                </button>
              ` : null}
              
              <div className="w-px h-6 bg-white/10 mx-2"></div>
              
              <button onClick=${onLogout} className="px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest text-rose-500 hover:bg-rose-500/10 transition-all">
                Salir
              </button>
            </div>
          </div>
        </nav>
      `;
    }

    function DisplayView({ activeEvent, BingoEngine }) {
      if (!activeEvent) return html`<div class="min-h-screen bg-black flex items-center justify-center text-amber-500 font-black tracking-[0.5em] animate-pulse">CARGANDO TRANSMISIÓN ROYALE...</div>`;

      const lastNumber = activeEvent.drawnNumbers[activeEvent.drawnNumbers.length - 1];
      const history = [...activeEvent.drawnNumbers].reverse().slice(1, 6);
      const winnersHistory = activeEvent.winnersHistory || [];
      const isFinished = activeEvent.status === 'finished';
      const lastWinner = winnersHistory.length > 0 ? winnersHistory[winnersHistory.length - 1] : null;

      // Generar confetti virtual
      const confettiArray = useMemo(() => {
        if (!isFinished && !(lastWinner && activeEvent.drawnNumbers.length === 0)) return [];
        return Array.from({ length: 50 }, (_, i) => ({
          id: i,
          left: Math.random() * 100 + '%',
          delay: Math.random() * 3 + 's',
          color: ['#D4AF37', '#F9E076', '#FFFFFF', '#4338ca'][Math.floor(Math.random() * 4)]
        }));
      }, [isFinished, lastWinner, activeEvent.drawnNumbers.length]);

      useEffect(() => {
        if (isFinished || (lastWinner && activeEvent.drawnNumbers.length === 0)) {
          VoiceService.playJackpot();
        }
      }, [isFinished, lastWinner?.round]);
      
      return html`
        <div class="min-h-screen bg-[#05070a] text-white p-8 flex flex-col gap-8 overflow-hidden relative">
          <!-- ANUNCIO DE GANADORES FINAL (OVERLAY) -->
          ${isFinished && html`
            <div class="absolute inset-0 z-[100] flex items-center justify-center bg-black/95 backdrop-blur-3xl animate-in fade-in duration-1000">
                <div class="confetti-container">
                  ${confettiArray.map(c => html`
                    <div key=${c.id} class="confetti" style=${{ left: c.left, animationDelay: c.delay, backgroundColor: c.color }}></div>
                  `)}
                </div>
              
              <div class="max-w-6xl w-full p-12 space-y-12 text-center relative z-10">
                <div class="space-y-4">
                  <p class="bingo-title text-4xl italic tracking-[0.8em] jackpot-glow">GALA FINALIZADA</p>
                  <h2 class="text-7xl font-black text-white uppercase tracking-tighter italic">CUADRO DE HONOR ROYALE</h2>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  ${winnersHistory.map(w => html`
                    <div key=${w.round} class="glass-card p-8 rounded-[3rem] border-amber-500/20 space-y-4 relative overflow-hidden group hover:border-amber-500 transition-all">
                      <div class="absolute top-4 right-6 text-[10px] font-black text-amber-500/20 group-hover:text-amber-500 transition-colors uppercase italic">Ronda #${w.round}</div>
                      <div class="space-y-1 text-left">
                        <p class="text-white font-black text-3xl uppercase tracking-tighter">${w.playerName}</p>
                        <p class="text-amber-500/60 font-black text-[10px] uppercase tracking-widest">Mesa #${w.cardNumber}</p>
                      </div>
                      <div class="flex justify-between items-end pt-4 border-t border-white/5">
                        <div class="text-left">
                          <p class="text-[8px] text-slate-500 font-black uppercase tracking-widest">Velocidad</p>
                          <p class="text-emerald-500 font-black text-2xl italic">${w.speed}s</p>
                        </div>
                        <div class="w-10 h-10 bg-amber-500/10 rounded-full flex items-center justify-center text-xl">🏆</div>
                      </div>
                    </div>
                  `)}
                </div>

                <div class="pt-10">
                  <div class="inline-flex items-center gap-4 px-10 py-5 rounded-full bg-white text-black font-black uppercase tracking-[0.4em] text-2xl animate-bounce">
                    👑 HASTA LA PRÓXIMA GALA
                  </div>
                </div>
              </div>
            </div>
          `}

          <!-- ANUNCIO DE GANADOR MOMENTÁNEO (ENTRE RONDAS) -->
          ${(!isFinished && lastWinner && activeEvent.drawnNumbers.length === 0) && html`
            <div class="absolute inset-0 z-[90] flex items-center justify-center bg-black/60 backdrop-blur-xl animate-in fade-in zoom-in duration-700">
                <div class="confetti-container">
                  ${confettiArray.map(c => html`
                    <div key=${c.id} class="confetti" style=${{ left: c.left, animationDelay: c.delay, backgroundColor: c.color }}></div>
                  `)}
                </div>
            <div className="text-center space-y-8 relative z-10">
                <p className="bingo-title text-3xl italic tracking-[0.5em] jackpot-glow">GANADOR RONDA #${lastWinner.round}</p>
                <h2 className="text-[10rem] font-black text-white uppercase tracking-tighter italic leading-none drop-shadow-[0_0_50px_rgba(212,175,55,0.6)]">
                  ${lastWinner.playerName}
                </h2>
                <div className="inline-flex items-center gap-4 px-8 py-4 rounded-full bg-amber-500 text-deep-bg font-black uppercase tracking-[0.3em] text-xl shadow-[0_0_30px_rgba(212,175,55,0.4)]">
                  PREPARANDO SIGUIENTE RONDA...
                </div>
              </div>
            </div>
          `}

          <!-- TOP BAR -->
          <div class="flex justify-between items-center border-b border-amber-500/20 pb-6">
            <div class="space-y-1">
              <h1 class="bingo-title text-5xl italic">${activeEvent.name}</h1>
              <div class="flex items-center gap-3">
                <p class="text-amber-500/60 font-black text-xs uppercase tracking-[0.4em]">Sorteo Oficial</p>
                <span class="px-3 py-1 bg-white/5 rounded-full text-[10px] font-black text-white uppercase tracking-widest">Jugada ${activeEvent.currentRound} / ${activeEvent.totalRounds}</span>
              </div>
            </div>
            <div class="text-right">
              <div class="px-6 py-3 bg-amber-500/10 border border-amber-500/20 rounded-2xl inline-block">
                <p class="text-amber-500 font-black text-[10px] uppercase tracking-widest">Modo de Juego</p>
                <p class="text-2xl font-black text-white uppercase tracking-tighter italic">

                    activeEvent.pattern === 'line' ? 'Línea Recta' : 
                    activeEvent.pattern === 'four_corners' ? '4 Esquinas' : 'Letra X'}
                </p>
              </div>
            </div>
          </div>

          <div class="flex-1 grid grid-cols-12 gap-8 min-h-0">
            <!-- LEFT: CURRENT NUMBER (4K OPTIMIZED) -->
            <div class="col-span-5 flex flex-col gap-8">
              <div class="flex-1 glass-card rounded-[4rem] border-amber-500/30 flex flex-col items-center justify-center relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-b from-amber-500/5 to-transparent"></div>
                <p class="text-amber-500 font-black text-xl uppercase tracking-[0.5em] mb-4">Última Balota</p>
                <div class="relative">
                  <div class="absolute inset-0 bg-amber-500 blur-[100px] opacity-20"></div>
                  <span class="text-[20rem] font-black leading-none tracking-tighter italic drop-shadow-[0_0_50px_rgba(212,175,55,0.4)]">
                    ${lastNumber ? html`
                      <span class="text-amber-500/30 mr-[-0.1em]">${BingoEngine.getLetter(lastNumber)}</span>
                      <span>${lastNumber}</span>
                    ` : '--'}
                  </span>
                </div>
              </div>

              <!-- HISTORY -->
              <div class="h-48 glass-card rounded-[3rem] p-8 flex flex-col justify-center">
                <p class="text-slate-500 font-black text-[10px] uppercase tracking-[0.3em] mb-4">Anteriores</p>
                <div class="flex gap-4">
                  ${history.map((num, i) => html`
                    <div key=${num} class="w-20 h-20 rounded-2xl bg-slate-900 border border-slate-800 flex items-center justify-center text-3xl font-black text-slate-400 opacity-${100 - (i * 20)}">
                      ${num}
                    </div>
                  `)}
                  ${history.length === 0 && html`<div class="text-slate-700 font-black italic tracking-widest uppercase">Iniciando gala...</div>`}
                </div>
              </div>
            </div>

            <!-- RIGHT: FULL BOARD -->
            <div class="col-span-7 glass-card rounded-[4rem] p-10 flex flex-col border-amber-500/10">
              <div class="grid grid-cols-16 gap-2 flex-1">
                ${['B','I','N','G','O'].map(letter => {
                  const range = letter === 'B' ? [1,15] : letter === 'I' ? [16,30] : letter === 'N' ? [31,45] : letter === 'G' ? [46,60] : [61,75];
                  const nums = Array.from({length: 15}, (_, i) => range[0] + i);
                  
                  return html`
                    <div class="contents">
                      <div class="flex items-center justify-center font-black text-2xl text-amber-500/40 border-r border-amber-500/10 pr-2 mr-2">${letter}</div>
                      ${nums.map(n => {
                        const isDrawn = activeEvent.drawnNumbers.includes(n);
                        const isLast = n === lastNumber;
                        return html`
                          <div key=${n} class="aspect-square rounded-xl flex items-center justify-center text-xl font-black transition-all duration-500
                            ${isLast ? 'bg-amber-500 text-deep-bg scale-110 shadow-[0_0_20px_rgba(212,175,55,0.6)] z-10' : 
                              isDrawn ? 'bg-amber-500/20 text-amber-500 border border-amber-500/30' : 
                              'bg-white/5 text-slate-700 border border-white/5'}">
                            ${n}
                          </div>
                        `;
                      })}
                    </div>
                  `;
                })}
              </div>
            </div>
          </div>
          
          <style>
            .grid-cols-16 { grid-template-columns: repeat(16, minmax(0, 1fr)); }
          </style>
        </div>
      `;
    }

    function AdminStaffLogin({ onLogin, type }) {
      const [user, setUser] = useState('');
      const [pass, setPass] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        const success = await onLogin(user, pass);
        if (!success) alert('Credenciales Inválidas');
        setLoading(false);
      };

      return html`
        <div class="min-h-screen flex items-center justify-center p-6 bg-black">
          <form onSubmit=${handleSubmit} class="max-w-md w-full glass-card p-12 rounded-[3.5rem] border-amber-500/30 space-y-8 fade-up text-center">
            <div class="space-y-2">
              <span class="text-amber-500 font-black text-[10px] uppercase tracking-[0.5em]">Acceso de Seguridad</span>
              <h2 class="bingo-title text-4xl italic">${type === 'admin' ? 'ADMIN CONSOLE' : 'STAFF TERMINAL'}</h2>
            </div>
            
            <div class="space-y-6 text-left">
              <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Usuario</label>
                <input type="text" required value=${user} onChange=${e => setUser(e.target.value)} class="w-full bg-black/40 border border-slate-800 rounded-2xl p-4 text-white font-bold outline-none focus:border-amber-500 transition-all" />
              </div>
              <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Contraseña</label>
                <input type="password" required value=${pass} onChange=${e => setPass(e.target.value)} class="w-full bg-black/40 border border-slate-800 rounded-2xl p-4 text-white font-bold outline-none focus:border-amber-500 transition-all" />
              </div>
            </div>

            <button type="submit" disabled=${loading} class="w-full gold-gradient-bg text-deep-bg font-black py-5 rounded-2xl shadow-xl transition transform active:scale-95 uppercase tracking-widest text-sm">
              ${loading ? 'VALIDANDO...' : 'ENTRAR AL SISTEMA'}
            </button>
            
            <p class="text-[8px] text-slate-700 font-black uppercase tracking-[0.3em]">Protocolo Multi-Dispositivo Royale</p>
          </form>
        </div>
      `;
    }

    function SharedCardView({ cardId, cards, activeEvent, drawnNumbersSet }) {
      const card = useMemo(() => cards.find(c => c.id === cardId), [cards, cardId]);
      
      if (!card || !activeEvent) return html`<div class="min-h-screen flex items-center justify-center text-amber-500 font-black tracking-widest animate-pulse">CARGANDO CARTÓN COMPARTIDO...</div>`;

      const markTimes = card.markTimes || {};

      return html`
        <div class="view-container p-4 md:p-8 max-w-2xl mx-auto space-y-8">
          <div class="text-center space-y-2 pt-10">
            <span class="text-amber-500 font-black text-[10px] uppercase tracking-[0.4em]">Invitado de Gala</span>
            <h2 class="text-4xl font-black text-white uppercase tracking-tighter italic">${card.sharedAlias || 'Jugador Invitado'}</h2>
            <div class="inline-flex items-center gap-2 px-4 py-1 rounded-full bg-amber-500/10 border border-amber-500/20">
               <span class="text-amber-500 font-black tracking-widest text-[8px] uppercase">Mesa Royale #${card.cardNumber}</span>
            </div>
          </div>

          <${BingoCard} 
            card=${card} 
            drawnNumbersSet=${drawnNumbersSet} 
            onToggleMark=${async (cell) => {
              if (card.status !== 'active') return;
              const isFree = cell === 'FREE';

              // RESTRICCIÓN SENIOR: Solo permitir marcar si el número ha salido en la tómbola
              if (!isFree && !drawnNumbersSet.has(Number(cell))) {
                VoiceService.speak(`No ha salido`, 1);
                return;
              }

              const newMarkTimes = { ...markTimes };
              if (newMarkTimes[cell]) delete newMarkTimes[cell];
              else {
                newMarkTimes[cell] = Date.now();
                VoiceService.playSuccess();
              }
              await updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'cards', card.id), {
                markTimes: newMarkTimes
              });
            }}
          />
          
          <div class="text-center pb-10">
            <p class="text-slate-600 font-black text-[8px] uppercase tracking-[0.3em]">Cortesía de ${card.playerName}</p>
          </div>
        </div>
      `;
    }

    // --- MAIN APP ---
    function App() {
      const { type, eventSlug, navigate, getCleanBaseUrl } = useRouting();
      const { user, userRole, loading: authLoading } = useAuthManager();
      const { events, cards, activeEvent, drawnNumbersSet, loading: dataLoading } = useBingoData(user, eventSlug);
      const [isLocalFile, setIsLocalFile] = useState(window.location.protocol === 'file:');

      // REDIRECCIÓN AUTOMÁTICA: Si el usuario entra a la raíz y hay un evento activo, llevarlo allí
      useEffect(() => {
        if (type === 'home' && activeEvent && activeEvent.status === 'active' && !dataLoading) {
          navigate('/' + activeEvent.slug);
        }
      }, [type, activeEvent, dataLoading, navigate]);

      // Actions (Memoized for performance)
      const handleSystemLogin = useCallback(async (username, password) => {
        const userClean = username.trim().toLowerCase();
        const passClean = password.trim();

        try {
          const staffSnap = await getDocs(query(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'staff'), 
            where('username', '==', userClean), 
            where('password', '==', passClean)));
          
          if (!staffSnap.empty) {
            let currentUid = auth.currentUser?.uid;
            if (!currentUid) {
              const res = await signInAnonymously(auth);
              currentUid = res.user.uid;
            }
            
            await updateDoc(staffSnap.docs[0].ref, { uid: currentUid });
            await setDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'users', currentUid), { 
              role: staffSnap.docs[0].data().role || ROLES.STAFF,
              username: userClean
            }, { merge: true });
            
            navigate(staffSnap.docs[0].data().role === ROLES.ADMIN ? '/admin' : '/staff');
            return true;
          }
          return false;
        } catch (error) {
          console.error("Auth System Error:", error);
          return false;
        }
      }, [navigate]);

      const handleLoginGoogle = useCallback(async () => {
        if (window.location.protocol === 'file:') {
          alert('🚨 ERROR DE SEGURIDAD GOOGLE: Usa un servidor local.');
          return;
        }
        try {
          const provider = new GoogleAuthProvider();
          provider.setCustomParameters({ prompt: 'select_account' });
          await signInWithPopup(auth, provider);
        } catch (error) {
          console.error("Error Google Login:", error);
        }
      }, []);

      const handleLogout = useCallback(async () => {
        await signOut(auth);
        window.location.reload();
      }, []);

      const handleCreateEvent = useCallback(async (name, count, rounds) => {
        const batch = writeBatch(db);
        
        events.filter(e => e.status === 'active').forEach(e => {
          batch.update(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'events', e.id), { status: 'finished', finishedAt: Date.now() });
        });

        const eventNameFinal = name || 'Gala Bingo Royale';
        const eRef = doc(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'events'));
        batch.set(eRef, { 
          name: eventNameFinal, 
          status: 'active', 
          drawnNumbers: [], 
          pattern: 'full', 
          totalRounds: Number(rounds) || 5,
          currentRound: 1,
          winnersHistory: [], // Native array
          tempChangeCodes: [], // Native array
          createdAt: Date.now(),
          slug: BingoEngine.slugify(eventNameFinal)
        });

        cards.forEach(c => {
          batch.update(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'cards', c.id), {
            status: 'available',
            playerId: null,
            playerName: null,
            markTimes: {}, // Native object
            sharedAlias: null,
            eventId: eRef.id
          });
        });

        if (cards.length < count) {
          for(let i = cards.length + 1; i <= count; i++) {
            const cRef = doc(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'cards'));
            batch.set(cRef, { 
              eventId: eRef.id, 
              cardNumber: i, 
              numbers: BingoEngine.generateCard(), // Already returns flat array
              status: 'available', 
              playerId: null, 
              playerName: null, 
              markTimes: {},
              createdAt: Date.now() 
            });
          }
        }

        await batch.commit();
        alert(`Gala "${eventNameFinal}" Iniciada.\n\nEnlace de Invitación: ${getCleanBaseUrl()}#/${BingoEngine.slugify(eventNameFinal)}`);
        navigate('/' + BingoEngine.slugify(eventNameFinal));
      }, [events, cards, navigate, getCleanBaseUrl]);

      const handleReserveCard = useCallback(async (cardId, name) => {
        const userSnap = await getDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'users', user.uid));
        const isPreAuthorized = userSnap.exists() && userSnap.data().preAuthorized === true;
        
        await updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'cards', cardId), { 
          status: isPreAuthorized ? 'active' : 'reserved', 
          playerId: user.uid, 
          playerName: name, 
          reservedAt: Date.now() 
        });

        if (isPreAuthorized) {
          await updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'users', user.uid), { preAuthorized: false });
        }
      }, [user]);

      const handleActivateCard = useCallback(async (id) => {
        const c = cards.find(x => x.id === id);
        if(!c) return { success: false, msg: 'Error: Cartón no registrado' };
        if(c.status === 'active') return { success: false, msg: 'YA SE ACTIVÓ EL CARTÓN' };
        await updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'cards', id), { status: 'active' });
        return { success: true, msg: '¡Acceso Concedido!' };
      }, [cards]);

      const handleRequestChange = useCallback(async (cardId, code) => {
          if (!activeEvent || code.trim() !== MASTER_CHANGE_CODE) return false;
          await updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'cards', cardId), { status: 'available', playerId: null, playerName: null });
          await setDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'users', user.uid), { preAuthorized: true }, { merge: true });
          return true;
      }, [activeEvent, user]);

      const handleDrawNumber = useCallback(async () => {
        if (!activeEvent) return;
        const available = Array.from({length:75}, (_,i)=>i+1).filter(n => !activeEvent.drawnNumbers.includes(n));
        if(available.length === 0) return;
        const next = available[Math.floor(Math.random() * available.length)];
        await updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'events', activeEvent.id), {
          drawnNumbers: [...activeEvent.drawnNumbers, next]
        });
        VoiceService.speak(`${BingoEngine.getLetter(next)}, ${next}`, 3);
      }, [activeEvent]);

      const handleShareCard = useCallback(async (cardId) => {
        const alias = prompt('Introduce un alias:');
        if (!alias) return;
        await updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'cards', cardId), { sharedAlias: alias });
        const url = `${getCleanBaseUrl()}#/card/${cardId}`;
        navigator.clipboard.writeText(url);
        alert(`¡Enlace copiado!\n\n${url}`);
      }, [getCleanBaseUrl]);

      const handleFinalizeEventExternally = useCallback(async (eventId) => {
        if (!confirm('¿Finalizar gala?')) return;
        await updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'events', eventId), { status: 'finished', finishedAt: Date.now() });
      }, []);

      if (authLoading || dataLoading) return html`
        <div class="min-h-screen flex flex-col items-center justify-center space-y-8 bg-black">
          <div class="relative w-24 h-24">
            <div class="absolute inset-0 border-4 border-amber-500/10 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
          </div>
          <div class="text-center space-y-2">
            <h1 class="bingo-title text-4xl italic">BINGO ROYALE</h1>
            <p class="text-slate-700 text-[9px] font-black uppercase tracking-[0.6em]">Protocolo de Alta Seguridad</p>
          </div>
        </div>
      `;

      return html`
        <div class="view-container relative">
          ${isLocalFile && html`
            <div class="fixed bottom-6 left-6 right-6 z-[1000] glass-card p-6 rounded-3xl border-rose-500/40 bg-rose-500/10 backdrop-blur-3xl flex flex-col md:flex-row items-center justify-between gap-6 animate-in slide-in-from-bottom duration-700">
              <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-rose-500 rounded-2xl flex items-center justify-center text-2xl shadow-[0_0_20px_rgba(244,63,94,0.4)]">⚠️</div>
                <div class="text-left">
                  <p class="text-white font-black text-sm uppercase tracking-tighter italic">Error de Origen Detectado</p>
                  <p class="text-rose-200 text-[10px] font-medium leading-tight">Google Auth NO funciona en <code class="bg-black/40 px-1 rounded">file://</code>. Debes usar un servidor local para jugar.</p>
                </div>
              </div>
              <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="bg-black/60 px-4 py-2 rounded-xl border border-white/10 font-mono text-[10px] text-emerald-400 flex-1 md:flex-initial text-center">npx serve .</div>
                <button onClick=${() => setIsLocalFile(false)} class="text-white/40 hover:text-white transition-colors text-xs">✕</button>
              </div>
            </div>
          `}

          ${type === 'shared_card' ? html`<${SharedCardView} cardId=${routeInfo.cardId} cards=${cards} activeEvent=${activeEvent} drawnNumbersSet=${drawnNumbersSet} />` : null}
          ${type === 'display' ? html`<${DisplayView} activeEvent=${activeEvent} BingoEngine=${BingoEngine} />` : null}
          ${type === 'admin' ? (
            userRole !== ROLES.ADMIN ? html`<${AdminStaffLogin} onLogin=${handleSystemLogin} type="admin" />` : 
            html`
              <div className="view-container">
                <${Navbar} setView=${(v) => navigate('/' + v)} currentView="admin" userRole=${userRole} onLogout=${handleLogout} />
                <${AdminView} 
                  userRole=${userRole} 
                  activeEvent=${activeEvent} 
                  cards=${cards} 
                  events=${events}
                  onCreateEvent=${handleCreateEvent} 
                  onDrawNumber=${handleDrawNumber} 
                  onChangePattern=${(p) => updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'events', activeEvent.id), {pattern:p})} 
                  onResetGame=${() => updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'events', activeEvent.id), {drawnNumbers:[]})} 
                  getCleanBaseUrl=${getCleanBaseUrl} 
                  onFinalizeEventExternally=${handleFinalizeEventExternally}
                />
              </div>
            `
          ) : null}
          ${type === 'staff' ? (
            (userRole !== ROLES.ADMIN && userRole !== ROLES.STAFF) ? html`<${AdminStaffLogin} onLogin=${handleSystemLogin} type="staff" />` :
            html`
              <div className="view-container">
                <${Navbar} setView=${(v) => navigate('/' + v)} currentView="staff" userRole=${userRole} onLogout=${handleLogout} />
                <${ScannerView} 
                  user=${user} 
                  onActivateCard=${handleActivateCard} 
                />
              </div>
            `
          ) : null}
          ${type === 'home' ? html`
              <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center space-y-8 bg-black">
                <div class="space-y-4">
                  <h1 class="bingo-title text-6xl italic">ROYALE ACCESS</h1>
                  <div class="h-px w-32 mx-auto bg-amber-500/20"></div>
                  <p class="text-amber-500 font-black text-xs uppercase tracking-[0.4em] max-w-xs mx-auto leading-relaxed">
                    Acceso exclusivo mediante invitación. Por favor, ingresa con el enlace proporcionado por el organizador.
                  </p>
                </div>
                <div class="glass-card p-8 rounded-[2rem] border-rose-500/20">
                  <span class="text-rose-500 font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span> Entrada Privada
                  </span>
                </div>
              </div>
          ` : null}

          ${type === 'player' ? (
            (!activeEvent || activeEvent.slug !== eventSlug) ? html`
              <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center space-y-8 bg-black">
                <div class="space-y-4">
                  <h1 class="bingo-title text-6xl italic">ROYALE ACCESS</h1>
                  <div class="h-px w-32 mx-auto bg-amber-500/20"></div>
                  <p class="text-amber-500 font-black text-xs uppercase tracking-[0.4em] max-w-xs mx-auto leading-relaxed">
                    El enlace de invitación es inválido, ha expirado o la gala ya ha concluido.
                  </p>
                </div>
                <div class="glass-card p-8 rounded-[2rem] border-rose-500/20">
                  <span class="text-rose-500 font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span> Invitación Inválida
                  </span>
                </div>
              </div>
            ` : html`
              <div class="view-container">
                <${PlayerView} 
                  activeEvent=${activeEvent} 
                  cards=${cards} 
                  user=${user} 
                  onReserveCard=${handleReserveCard} 
                  onRequestChange=${handleRequestChange} 
                  onLoginGoogle=${handleLoginGoogle}
                  onLogout=${handleLogout}
                  onShareCard=${handleShareCard}
                />
              </div>
            `
          ) : null}
        </div>
      `;
    }

    // --- PLACEHOLDER COMPONENTS FOR ISOLATION ---

    function AdminView({ userRole, activeEvent, cards, events, onCreateEvent, onDrawNumber, onChangePattern, onResetGame, getCleanBaseUrl, onFinalizeEventExternally }) {
      const [eventName, setEventName] = useState('');
      const [cardCount, setCardCount] = useState(100);
      const [totalRounds, setTotalRounds] = useState(5);
      const [collabEmail, setCollabEmail] = useState('');
      const [collabs, setCollabs] = useState([]);
      const [isProcessing, setIsProcessing] = useState(false);
      const [winnerCandidates, setWinnerCandidates] = useState([]);
      const [validateCardId, setValidateCardId] = useState('');
      const [showDashboard, setShowDashboard] = useState(false);

      const [staffUser, setStaffUser] = useState('');
      const [staffPass, setStaffPass] = useState('');

      const activeEvents = useMemo(() => events.filter(e => e.status === 'active'), [events]);
      const finishedEvents = useMemo(() => events.filter(e => e.status === 'finished').sort((a,b) => b.finishedAt - a.finishedAt), [events]);

      const invitationUrl = useMemo(() => {
        if (!activeEvent) return '';
        return `${getCleanBaseUrl()}#/${activeEvent.slug}`;
      }, [activeEvent, getCleanBaseUrl]);

      useEffect(() => {
        if(userRole === ROLES.ADMIN) {
          return onSnapshot(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'staff'), (s) => {
            setCollabs(s.docs.map(d => ({id: d.id, ...d.data()})));
          });
        }
      }, [userRole]);

      const handleAddStaff = async () => {
        if(!staffUser.trim() || !staffPass.trim()) return;
        const email = `${staffUser.toLowerCase()}${SYSTEM_DOMAIN}`;
        try {
          // Nota: Crear usuario en Firebase Auth requiere Admin SDK o hacerlo vía cliente si no hay sesión activa.
          // Para esta SPA, guardaremos las credenciales en Firestore y el staff se "auto-registrará" al primer login exitoso
          // o simplemente usaremos el registro directo si el Admin lo crea.
          // Una forma "Senior" es usar una Cloud Function, pero aquí lo haremos vía Firestore para simplicidad de despliegue.
          const ref = doc(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'staff'));
          await setDoc(ref, {
            username: staffUser.trim(),
            password: staffPass.trim(), // En una app real esto iría hasheado
            role: ROLES.STAFF,
            createdAt: Date.now()
          });
          setStaffUser('');
          setStaffPass('');
          alert(`Staff ${staffUser} creado con éxito.`);
        } catch (e) { console.error(e); }
      };

      const handleDeleteStaff = async (id) => {
        if(confirm('¿Eliminar acceso a este colaborador?')) {
          await deleteDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'staff', id));
        }
      };

      const getStaffInviteUrl = (email) => {
        return `${getCleanBaseUrl()}#/staff?email=${encodeURIComponent(email)}`;
      };

      const checkWinner = (card, drawnNumbers, pattern) => {
        const numbers = card.numbers || [];
        const markTimes = card.markTimes || {};
        
        // Reconstruir matriz para comprobación de patrones
        const matrix = [];
        for(let i=0; i<5; i++) matrix.push(numbers.slice(i*5, (i+1)*5));
        
        let cellsToMatch = [];
        if (pattern === 'full') {
          for(let r=0; r<5; r++) for(let c=0; c<5; c++) if(matrix[r][c] !== 'FREE') cellsToMatch.push(matrix[r][c]);
        } else if (pattern === 'line') {
          for(let r=0; r<5; r++) {
            let row = []; for(let c=0; c<5; c++) if(matrix[r][c] !== 'FREE') row.push(matrix[r][c]);
            cellsToMatch.push(row);
          }
          for(let c=0; c<5; c++) {
            let col = []; for(let r=0; r<5; r++) if(matrix[r][c] !== 'FREE') col.push(matrix[r][c]);
            cellsToMatch.push(col);
          }
        } else if (pattern === 'four_corners') {
          cellsToMatch = [matrix[0][0], matrix[0][4], matrix[4][0], matrix[4][4]].filter(x => x !== 'FREE');
        } else if (pattern === 'letter_x') {
          let diag1 = []; for(let i=0; i<5; i++) if(matrix[i][i] !== 'FREE') diag1.push(matrix[i][i]);
          let diag2 = []; for(let i=0; i<5; i++) if(matrix[i][4-i] !== 'FREE') diag2.push(matrix[i][4-i]);
          cellsToMatch = [diag1, diag2];
        }

        const isMatch = (list) => list.every(n => drawnNumbers.includes(n));
        const getCompletionTime = (list) => Math.max(...list.map(n => markTimes[n] || 0));

        if (Array.isArray(cellsToMatch[0])) {
          const validPaths = cellsToMatch.filter(isMatch);
          if (validPaths.length > 0) {
            return { valid: true, time: Math.min(...validPaths.map(getCompletionTime)) };
          }
        } else {
          if (isMatch(cellsToMatch)) {
            return { valid: true, time: getCompletionTime(cellsToMatch) };
          }
        }
        return { valid: false };
      };

      const handleValidateWinner = async (cardId) => {
        const card = cards.find(c => c.id === cardId || c.cardNumber == cardId);
        if (!card) return alert('Cartón no encontrado');
        
        const result = checkWinner(card, activeEvent.drawnNumbers, activeEvent.pattern);
        if (result.valid) {
          const speed = ((result.time - activeEvent.createdAt) / 1000).toFixed(2);

          cardNumber: winner.cardNumber,

          time: Date.now()

        const newHistory = [...currentHistory, winnerData];

        if (isLastRound) {

      useEffect(() => {
        if (!user?.uid) return;
        return onSnapshot(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'staff'), (s) => {
          const found = s.docs.find(d => d.data().uid === user.uid);
          if(found) setMyStaffData({id: found.id, ...found.data()});
        });
      }, [user?.uid]);

      useEffect(() => {
        let isMounted = true;
        const startScanner = async () => {
          try {
            if (!scannerRef.current) {
              // OPTIMIZACIÓN MÓVIL SENIOR: Ajuste de parámetros para pantalla completa
              scannerRef.current = new Html5QrcodeScanner("qr-reader", { 
                fps: 15, 
                qrbox: (viewfinderWidth, viewfinderHeight) => {
                  const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
                  const size = Math.floor(minEdge * 0.7);
                  return { width: size, height: size };
                },
                aspectRatio: window.innerWidth < 640 ? (window.innerHeight / window.innerWidth) : 1.0,
                showTorchButtonIfSupported: true
              }, false);
            }
            
            scannerRef.current.render(async (text) => {
              if (!isMounted) return;
              setLog({ text: 'VERIFICANDO TOKEN...', type: 'info' });
              
              const res = await onActivateCard(text);
              if (res.success) {
                VoiceService.playSuccess();
                setHistory(prev => [{ id: text, time: new Date().toLocaleTimeString(), msg: res.msg }, ...prev].slice(0, 5));
              }
              
              setLog({ text: res.msg.toUpperCase(), type: res.success ? 'success' : (res.msg === 'YA SE ACTIVÓ EL CARTÓN' ? 'warning' : 'error') });
            }, (err) => {
              // Ignorar ruidos
            });
            
            if (isMounted) setLog({ text: 'ESPERANDO CÓDIGO QR...', type: 'info' });
          } catch (err) {
            console.error("Scanner Init Error:", err);
            if (isMounted) setLog({ text: 'ERROR AL INICIAR CÁMARA', type: 'error' });
          }
        };

        const timer = setTimeout(startScanner, 500);
        
        return () => {
          isMounted = false;
          clearTimeout(timer);
          if (scannerRef.current) {
            scannerRef.current.clear().catch(e => console.warn("Scanner cleanup error:", e));
          }
        };
      }, [onActivateCard]);

      return html`
        <div class="min-h-screen bg-[#05070a] pt-24 pb-20">
          <div class="max-w-2xl mx-auto px-6 space-y-8 fade-up">
            <!-- STAFF HEADER -->
            <div class="gold-gradient-bg p-8 rounded-[2.5rem] text-deep-bg shadow-2xl flex justify-between items-center relative overflow-hidden">
              <div className="absolute top-0 right-0 p-4 opacity-10">
              <svg xmlns="http://www.w3.org/2000/svg" className="h-24 w-24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth=${2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
              </svg>
            </div>
              <div class="space-y-1">
                <p class="text-[10px] font-black uppercase tracking-[0.4em] opacity-60">Operador Royale</p>
                <h3 class="text-3xl font-black tracking-tight">${myStaffData?.username?.toUpperCase() || 'COLABORADOR'}</h3>
              </div>
              <div class="bg-black/20 px-4 py-2 rounded-xl border border-black/10 text-center">
                <p class="text-[8px] font-black uppercase">Código Cambio</p>
                <p class="text-lg font-black tracking-widest text-white">${MASTER_CHANGE_CODE}</p>
              </div>
            </div>

            <!-- CAMBIO DE CARTÓN SECTION -->
            <div class="glass-card p-8 rounded-[2.5rem] border-indigo-500/20 space-y-4">
              <div class="text-center space-y-2">
                <h4 class="text-indigo-400 font-black text-xs uppercase tracking-[0.3em]">Protocolo Cambio de Cartón</h4>
                <div class="p-6 bg-indigo-500/10 border border-indigo-500/30 rounded-3xl">
                  <p class="text-5xl font-black text-white tracking-[0.2em] italic">${MASTER_CHANGE_CODE}</p>
                  <p class="text-slate-500 text-[8px] font-black uppercase tracking-widest mt-2">Entrega este código al jugador para liberar su mesa</p>
                </div>
              </div>
            </div>

            <!-- SCANNER SECTION -->
            <div class="glass-card p-4 sm:p-10 rounded-[3rem] space-y-8 text-center border-emerald-500/20 relative overflow-hidden">
              <div class="space-y-1">
                <h3 class="text-2xl font-black text-white uppercase tracking-tighter italic">Escáner de Recepción</h3>
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em]">Validación de Cartones Royale</p>
              </div>
              
              <div class="overflow-hidden rounded-[2.5rem] bg-black border-4 border-slate-900 shadow-2xl relative aspect-square max-w-sm mx-auto">
                <div id="qr-reader" class="w-full h-full"></div>
                <!-- OVERLAY SENIOR -->
                <div class="absolute inset-0 pointer-events-none border-[40px] border-black/40">
                  <div class="w-full h-full border-2 border-emerald-500/30 rounded-3xl relative">
                    <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-emerald-500 rounded-tl-xl"></div>
                    <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-emerald-500 rounded-tr-xl"></div>
                    <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-emerald-500 rounded-bl-xl"></div>
                    <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-emerald-500 rounded-br-xl"></div>
                  </div>
                </div>
              </div>
              
              <div class="p-6 rounded-2xl font-black text-sm uppercase tracking-[0.2em] transition-all duration-500 border shadow-lg
                ${log.type === 'success' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30 shadow-emerald-500/10' : 
                  log.type === 'warning' ? 'bg-amber-500/10 text-amber-500 border-amber-500/30 shadow-amber-500/10' :
                  log.type === 'error' ? 'bg-rose-500/10 text-rose-400 border-rose-500/30 shadow-rose-500/10' : 
                  'bg-black/40 text-slate-500 border-slate-800'}">
                ${log.text}
              </div>

              ${history.length > 0 && html`
                <div class="pt-6 space-y-4">
                  <p class="text-[10px] font-black text-slate-600 uppercase tracking-[0.3em] text-left ml-2">Bitácora de Acceso</p>
                  <div class="space-y-3">
                    ${history.map(h => html`
                      <div key=${h.id} class="bg-black/40 p-5 rounded-2xl border border-slate-800 flex justify-between items-center animate-in slide-in-from-left duration-300 group hover:border-emerald-500/30 transition-all">
                        <div class="text-left">
                          <p class="text-emerald-500 font-black text-xs uppercase italic">${h.msg}</p>
                          <p class="text-[8px] text-slate-600 font-black uppercase tracking-widest mt-1">${h.time} • TOKEN: ${h.id.substring(0,8)}</p>
                        </div>
                        <div class="w-10 h-10 bg-emerald-500/10 rounded-xl flex items-center justify-center text-emerald-500">✓</div>
                      </div>
                    `)}
                </div>
              </div>
            `}
          </div>
        </div>
      </div>
      <style>
        #qr-reader { border: none !important; }
        #qr-reader__dashboard { display: none !important; }
        #qr-reader__status_span { display: none !important; }
        #qr-reader video { border-radius: 2rem; object-fit: cover !important; }
        #qr-reader__scan_region { background: transparent !important; }
      </style>
      `;
    }

    createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
